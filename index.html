<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D 입체 오목 게임</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #2c3e50;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* 화면 쓸어넘기기 방지 */
        }
        #gameContainer {
            position: relative;
            background-color: #dbb361;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 5px;
        }
        canvas {
            display: block;
            border-radius: 5px;
            touch-action: none; /* 캔버스 내 터치 제스처 방지 */
        }
        .overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; cursor: pointer; z-index: 100;
            text-align: center; border-radius: 5px;
        }
        .title { font-size: 3rem; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 10px #f1c40f; }
        .subtitle { font-size: 1.2rem; color: #bdc3c7; }
        #uiInfo {
            position: absolute; top: -40px; left: 0; right: 0;
            display: flex; justify-content: space-between;
            color: white; font-size: 1.2rem; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="uiInfo">
        <span id="roundText">Round: 1 / 30</span>
        <span id="levelText">Level: 1</span>
    </div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="startScreen" class="overlay">
        <div class="title">Game Start</div>
        <div class="subtitle">화면을 터치하거나 클릭하세요</div>
    </div>
    
    <div id="gameOverScreen" class="overlay" style="display: none;">
        <div class="title" id="gameOverTitle">Game Over</div>
        <div class="subtitle">화면을 터치하여 다음 라운드 진행</div>
    </div>

    <div id="victoryScreen" class="overlay" style="display: none; background: rgba(0,0,0,0.9);">
        <div class="title" style="text-shadow: 0 0 20px #e74c3c; font-size: 4rem;">🎉 VICTORY! 🎉</div>
        <div class="subtitle">최종 레벨 정복! (터치하여 처음부터)</div>
    </div>
</div>

<script>
    // --- 게임 기본 세팅 ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const size = 15;
    let cellSize = 0;
    let margin = 0;
    
    let currentRound = 1;
    let currentLevel = 1;
    let playerTurn = true;
    let gameState = 'START';
    let board = [];

    // 바둑판 초기화 (가장 먼저 실행되도록 안전하게 구성)
    for (let i = 0; i < size; i++) {
        board[i] = [];
        for (let j = 0; j < size; j++) board[i][j] = 0;
    }

    // --- 오디오 시스템 (에러 방지 적용) ---
    let audioCtx = null;
    function initAudio() {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        } catch (e) {
            console.log("Audio Init Blocked"); // 오디오가 막혀도 게임은 멈추지 않음
        }
    }
    
    function playSound(type) {
        try {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            if (type === 'stone') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                gainNode.gain.setValueAtTime(0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'win') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.linearRampToValueAtTime(600, now + 0.5);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.linearRampToValueAtTime(0.01, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'lose') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.linearRampToValueAtTime(100, now + 0.5);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.linearRampToValueAtTime(0.01, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            }
        } catch(e) {}
    }

    // --- 화면 리사이징 ---
    function resize() {
        const windowMin = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.8);
        canvas.width = windowMin;
        canvas.height = windowMin;
        
        const container = document.getElementById('gameContainer');
        container.style.width = windowMin + 'px';
        container.style.height = windowMin + 'px';
        
        margin = canvas.width / (size + 1);
        cellSize = (canvas.width - margin * 2) / (size - 1);
        
        drawBoard();
    }
    window.addEventListener('resize', resize);

    // --- 게임 시작/초기화 ---
    function resetBoardData() {
        for (let i = 0; i < size; i++) {
            for (let j = 0; j < size; j++) {
                board[i][j] = 0;
            }
        }
        playerTurn = true;
        currentLevel = Math.ceil(currentRound / 3);
        if (currentLevel > 10) currentLevel = 10;
        document.getElementById('roundText').innerText = `Round: ${currentRound} / 30`;
        document.getElementById('levelText').innerText = `Level: ${currentLevel}`;
        drawBoard();
    }

    // --- 그리기 로직 ---
    function drawBoard() {
        ctx.fillStyle = '#dbb361';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1.5;
        
        for (let i = 0; i < size; i++) {
            ctx.beginPath();
            ctx.moveTo(margin, margin + i * cellSize);
            ctx.lineTo(canvas.width - margin, margin + i * cellSize);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(margin + i * cellSize, margin);
            ctx.lineTo(margin + i * cellSize, canvas.height - margin);
            ctx.stroke();
        }
        
        const dots = [3, 7, 11];
        ctx.fillStyle = '#333';
        for (let i of dots) {
            for (let j of dots) {
                ctx.beginPath();
                ctx.arc(margin + i * cellSize, margin + j * cellSize, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < size; i++) {
            for (let j = 0; j < size; j++) {
                if (board[i][j] !== 0) drawStone(i, j, board[i][j]);
            }
        }
    }

    function drawStone(x, y, type) {
        const cx = margin + x * cellSize;
        const cy = margin + y * cellSize;
        const radius = cellSize * 0.45;

        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);

        const gradient = ctx.createRadialGradient(
            cx - radius * 0.3, cy - radius * 0.3, radius * 0.1, cx, cy, radius
        );
        if (type === 1) { // 흑돌
            gradient.addColorStop(0, '#666');
            gradient.addColorStop(1, '#000');
        } else { // 백돌
            gradient.addColorStop(0, '#fff');
            gradient.addColorStop(1, '#ccc');
        }
        
        ctx.fillStyle = gradient;
        ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
        ctx.shadowBlur = 5;
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 2;
        ctx.fill();
        ctx.shadowColor = 'transparent';
    }

    // --- 입력 처리 (Pointer Event로 통일) ---
    canvas.addEventListener('pointerdown', function(e) {
        if (gameState !== 'PLAYING' || !playerTurn) return;
        
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const gridX = Math.round((x - margin) / cellSize);
        const gridY = Math.round((y - margin) / cellSize);

        if (gridX >= 0 && gridX < size && gridY >= 0 && gridY < size && board[gridX][gridY] === 0) {
            placeStone(gridX, gridY, 1);
        }
    });

    // --- 게임 진행 로직 ---
    function placeStone(x, y, player) {
        board[x][y] = player;
        playSound('stone');
        drawBoard();
        
        if (checkWin(x, y, player)) {
            endGame(player === 1 ? 'WIN' : 'LOSE');
            return;
        }
        
        playerTurn = !playerTurn;
        if (!playerTurn && gameState === 'PLAYING') {
            setTimeout(aiMove, 300);
        }
    }

    function checkWin(x, y, player) {
        const directions = [[1, 0], [0, 1], [1, 1], [1, -1]];
        for (let [dx, dy] of directions) {
            let count = 1;
            for (let i = 1; i <= 4; i++) {
                let nx = x + dx * i, ny = y + dy * i;
                if (nx < 0 || nx >= size || ny < 0 || ny >= size || board[nx][ny] !== player) break;
                count++;
            }
            for (let i = 1; i <= 4; i++) {
                let nx = x - dx * i, ny = y - dy * i;
                if (nx < 0 || nx >= size || ny < 0 || ny >= size || board[nx][ny] !== player) break;
                count++;
            }
            if (count >= 5) return true;
        }
        return false;
    }

    function endGame(result) {
        gameState = 'GAMEOVER';
        const title = document.getElementById('gameOverTitle');
        if (result === 'WIN') {
            playSound('win');
            if (currentRound >= 30) {
                gameState = 'VICTORY';
                document.getElementById('victoryScreen').style.display = 'flex';
                startFireworks();
                return;
            }
            title.innerText = "You Win!";
            title.style.color = "#2ecc71";
            currentRound++; 
        } else {
            playSound('lose');
            title.innerText = "Game Over (AI Win)";
            title.style.color = "#e74c3c";
        }
        document.getElementById('gameOverScreen').style.display = 'flex';
    }

    // --- AI 알고리즘 ---
    function aiMove() {
        if (gameState !== 'PLAYING') return;
        
        let bestScore = -Infinity;
        let bestMoves = [];
        const noiseMax = Math.max(0, 100 - (currentLevel * 10)); 

        for (let i = 0; i < size; i++) {
            for (let j = 0; j < size; j++) {
                if (board[i][j] === 0) {
                    let score = evaluatePosition(i, j, 2) + evaluatePosition(i, j, 1) * 1.2; 
                    score += Math.random() * noiseMax;

                    if (score > bestScore) {
                        bestScore = score;
                        bestMoves = [[i, j]];
                    } else if (score === bestScore) {
                        bestMoves.push([i, j]);
                    }
                }
            }
        }
        
        if (bestMoves.length > 0) {
            const move = bestMoves[Math.floor(Math.random() * bestMoves.length)];
            placeStone(move[0], move[1], 2);
        }
    }

    function evaluatePosition(x, y, player) {
        let totalScore = 0;
        const directions = [[1, 0], [0, 1], [1, 1], [1, -1]];
        
        for (let [dx, dy] of directions) {
            let count = 1; let openEnds = 0;
            
            for (let i = 1; i <= 4; i++) {
                let nx = x + dx * i, ny = y + dy * i;
                if (nx < 0 || nx >= size || ny < 0 || ny >= size) break;
                if (board[nx][ny] === player) count++;
                else if (board[nx][ny] === 0) { openEnds++; break; }
                else break;
            }
            for (let i = 1; i <= 4; i++) {
                let nx = x - dx * i, ny = y - dy * i;
                if (nx < 0 || nx >= size || ny < 0 || ny >= size) break;
                if (board[nx][ny] === player) count++;
                else if (board[nx][ny] === 0) { openEnds++; break; }
                else break;
            }

            if (count >= 5) totalScore += 100000;
            else if (count === 4 && openEnds === 2) totalScore += 10000;
            else if (count === 4 && openEnds === 1) totalScore += 1000;
            else if (count === 3 && openEnds === 2) totalScore += 500;
            else if (count === 3 && openEnds === 1) totalScore += 100;
            else if (count === 2 && openEnds === 2) totalScore += 50;
        }
        return totalScore;
    }

    // --- 불꽃놀이 파티클 ---
    let particles = [];
    let animationId;
    function startFireworks() {
        for (let i = 0; i < 150; i++) createParticle(canvas.width / 2, canvas.height / 2);
        animateFireworks();
    }

    function createParticle(x, y) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10,
            life: 1, color: `hsl(${Math.random() * 360}, 100%, 50%)`
        });
    }

    function animateFireworks() {
        if (gameState !== 'VICTORY') return;
        ctx.fillStyle = 'rgba(44, 62, 80, 0.2)'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < particles.length; i++) {
            let p = particles[i];
            ctx.beginPath();
            ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();

            p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life -= 0.01;
            if (p.life <= 0) { particles.splice(i, 1); i--; }
        }
        
        if (Math.random() < 0.1) {
            let basex = Math.random() * canvas.width;
            let basey = Math.random() * canvas.height * 0.5;
            for(let i=0; i<30; i++) createParticle(basex, basey);
            playSound('stone'); 
        }
        animationId = requestAnimationFrame(animateFireworks);
    }

    // --- UI 클릭 및 터치 (가림막 확실히 숨기기) ---
    function hideAllScreens() {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('gameOverScreen').style.display = 'none';
        document.getElementById('victoryScreen').style.display = 'none';
    }

    document.getElementById('startScreen').addEventListener('pointerdown', function() {
        initAudio(); hideAllScreens();
        gameState = 'PLAYING'; resetBoardData();
    });

    document.getElementById('gameOverScreen').addEventListener('pointerdown', function() {
        hideAllScreens();
        gameState = 'PLAYING'; resetBoardData();
    });

    document.getElementById('victoryScreen').addEventListener('pointerdown', function() {
        cancelAnimationFrame(animationId); particles = []; hideAllScreens();
        currentRound = 1; gameState = 'PLAYING'; resetBoardData();
    });

    // 초기 화면 그리기
    resize();
</script>

</body>
</html>
