<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D 입체 오목 게임</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* 모바일에서 화면 스크롤 방지 */
        }
        #gameContainer {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            cursor: pointer;
            z-index: 10;
        }
        .title {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #f1c40f;
            text-align: center;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #bdc3c7;
        }
        #uiInfo {
            position: absolute;
            top: -40px; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="uiInfo">
        <span id="roundText">Round: 1 / 30</span>
        <span id="levelText">Level: 1</span>
    </div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="startScreen" class="overlay">
        <div class="title">Game Start</div>
        <div class="subtitle">화면을 터치하거나 클릭하여 시작하세요</div>
    </div>
    
    <div id="gameOverScreen" class="overlay hidden">
        <div class="title" id="gameOverTitle">Game Over</div>
        <div class="subtitle">화면을 터치하여 다음 라운드 진행</div>
    </div>

    <div id="victoryScreen" class="overlay hidden" style="background: rgba(0,0,0,0.2);">
        <div class="title" style="text-shadow: 0 0 20px #e74c3c; font-size: 4rem;">🎉 VICTORY! 🎉</div>
        <div class="subtitle">최종 레벨을 정복했습니다! (터치하여 처음부터)</div>
    </div>
</div>

<script>
    // --- 게임 상태 및 변수 ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const size = 15; // 15x15 바둑판
    let board = [];
    let cellSize = 0;
    let margin = 0;
    
    let currentRound = 1;
    let currentLevel = 1;
    let playerTurn = true; // true: 플레이어(흑), false: AI(백)
    let gameState = 'START'; // START, PLAYING, GAMEOVER, VICTORY
    
    // --- 오디오 시스템 (Web Audio API) ---
    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }
    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        if (type === 'stone') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'win') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.5);
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        } else if (type === 'lose') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.5);
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }
    }

    // --- 리사이징 및 초기화 ---
    function resize() {
        // 모바일과 데스크톱 화면에 맞게 캔버스 크기 조절
        const windowMin = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.8);
        canvas.width = windowMin;
        canvas.height = windowMin;
        margin = canvas.width / (size + 1);
        cellSize = (canvas.width - margin * 2) / (size - 1);
        drawBoard();
    }
    window.addEventListener('resize', resize);

    function initBoard() {
        board = [];
        for (let i = 0; i < size; i++) {
            board[i] = [];
            for (let j = 0; j < size; j++) board[i][j] = 0;
        }
        playerTurn = true;
        updateUI();
        drawBoard();
    }

    function updateUI() {
        currentLevel = Math.ceil(currentRound / 3);
        if(currentLevel > 10) currentLevel = 10;
        document.getElementById('roundText').innerText = `Round: ${currentRound} / 30`;
        document.getElementById('levelText').innerText = `Level: ${currentLevel}`;
    }

    // --- 그래픽 (바둑판 및 입체 바둑알) ---
    function drawBoard() {
        // 배경 나무 질감 느낌
        ctx.fillStyle = '#dbb361';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1.5;
        
        // 격자 그리기
        for (let i = 0; i < size; i++) {
            // 가로선
            ctx.beginPath();
            ctx.moveTo(margin, margin + i * cellSize);
            ctx.lineTo(canvas.width - margin, margin + i * cellSize);
            ctx.stroke();
            // 세로선
            ctx.beginPath();
            ctx.moveTo(margin + i * cellSize, margin);
            ctx.lineTo(margin + i * cellSize, canvas.height - margin);
            ctx.stroke();
        }
        
        // 점(화점) 그리기
        const dots = [3, 7, 11];
        ctx.fillStyle = '#333';
        for (let i of dots) {
            for (let j of dots) {
                ctx.beginPath();
                ctx.arc(margin + i * cellSize, margin + j * cellSize, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 바둑알 그리기
        for (let i = 0; i < size; i++) {
            for (let j = 0; j < size; j++) {
                if (board[i][j] !== 0) {
                    drawStone(i, j, board[i][j]);
                }
            }
        }
    }

    function drawStone(x, y, type) {
        const cx = margin + x * cellSize;
        const cy = margin + y * cellSize;
        const radius = cellSize * 0.45;

        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);

        // 3D 입체 그라디언트
        const gradient = ctx.createRadialGradient(
            cx - radius * 0.3, cy - radius * 0.3, radius * 0.1, 
            cx, cy, radius
        );

        if (type === 1) { // 흑돌 (플레이어)
            gradient.addColorStop(0, '#666');
            gradient.addColorStop(1, '#000');
        } else { // 백돌 (AI)
            gradient.addColorStop(0, '#fff');
            gradient.addColorStop(1, '#ccc');
        }
        
        ctx.fillStyle = gradient;
        // 그림자 효과
        ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
        ctx.shadowBlur = 5;
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 2;
        
        ctx.fill();
        
        // 그림자 초기화
        ctx.shadowColor = 'transparent';
    }

    // --- 상호작용 (터치 및 클릭) ---
    function handleInput(e) {
        if (gameState !== 'PLAYING' || !playerTurn) return;
        
        e.preventDefault();
        initAudio(); // 첫 터치 시 오디오 컨텍스트 활성화
        
        let clientX, clientY;
        if (e.type === 'touchstart') {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }

        const rect = canvas.getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;

        // 클릭된 좌표를 그리드 인덱스로 변환
        const gridX = Math.round((x - margin) / cellSize);
        const gridY = Math.round((y - margin) / cellSize);

        if (gridX >= 0 && gridX < size && gridY >= 0 && gridY < size && board[gridX][gridY] === 0) {
            placeStone(gridX, gridY, 1);
        }
    }

    canvas.addEventListener('mousedown', handleInput);
    canvas.addEventListener('touchstart', handleInput, {passive: false});

    // --- 게임 로직 ---
    function placeStone(x, y, player) {
        board[x][y] = player;
        playSound('stone');
        drawBoard();
        
        if (checkWin(x, y, player)) {
            endGame(player === 1 ? 'WIN' : 'LOSE');
            return;
        }
        
        playerTurn = !playerTurn;
        if (!playerTurn) {
            setTimeout(aiMove, 300); // AI가 잠시 생각하는 듯한 지연 효과
        }
    }

    function checkWin(x, y, player) {
        const directions = [
            [1, 0], [0, 1], [1, 1], [1, -1]
        ];
        for (let [dx, dy] of directions) {
            let count = 1;
            // 한쪽 방향
            for (let i = 1; i <= 4; i++) {
                let nx = x + dx * i, ny = y + dy * i;
                if (nx < 0 || nx >= size || ny < 0 || ny >= size || board[nx][ny] !== player) break;
                count++;
            }
            // 반대 방향
            for (let i = 1; i <= 4; i++) {
                let nx = x - dx * i, ny = y - dy * i;
                if (nx < 0 || nx >= size || ny < 0 || ny >= size || board[nx][ny] !== player) break;
                count++;
            }
            if (count >= 5) return true;
        }
        return false;
    }

    function endGame(result) {
        gameState = 'GAMEOVER';
        const title = document.getElementById('gameOverTitle');
        if (result === 'WIN') {
            playSound('win');
            if (currentRound === 30) {
                gameState = 'VICTORY';
                document.getElementById('victoryScreen').classList.remove('hidden');
                startFireworks();
                return;
            }
            title.innerText = "You Win!";
            title.style.color = "#2ecc71";
            currentRound++; // 이겼을 때만 다음 라운드
        } else {
            playSound('lose');
            title.innerText = "Game Over (AI Win)";
            title.style.color = "#e74c3c";
            // 졌을 때는 라운드 유지 (다시 도전)
        }
        document.getElementById('gameOverScreen').classList.remove('hidden');
    }

    // --- AI 로직 ---
    function aiMove() {
        let bestScore = -Infinity;
        let bestMoves = [];

        // 레벨에 따른 노이즈 (실수 확률). 레벨이 높을수록 노이즈가 적어짐.
        const noiseMax = Math.max(0, 100 - (currentLevel * 10)); 

        for (let i = 0; i < size; i++) {
            for (let j = 0; j < size; j++) {
                if (board[i][j] === 0) {
                    // 공격 점수(2)와 방어 점수(1)를 합산
                    let score = evaluatePosition(i, j, 2) + evaluatePosition(i, j, 1) * 1.2; 
                    
                    // 레벨이 낮을수록 랜덤 점수를 추가하여 완벽하지 않게 만듦
                    score += Math.random() * noiseMax;

                    if (score > bestScore) {
                        bestScore = score;
                        bestMoves = [[i, j]];
                    } else if (score === bestScore) {
                        bestMoves.push([i, j]);
                    }
                }
            }
        }
        
        // 동일한 최고 점수 중 랜덤 선택
        if (bestMoves.length > 0) {
            const move = bestMoves[Math.floor(Math.random() * bestMoves.length)];
            placeStone(move[0], move[1], 2);
        }
    }

    // 해당 위치에 돌을 놓았을 때의 가치 평가
    function evaluatePosition(x, y, player) {
        let totalScore = 0;
        const directions = [[1, 0], [0, 1], [1, 1], [1, -1]];
        
        for (let [dx, dy] of directions) {
            let count = 1;
            let openEnds = 0;
            
            // 한쪽
            for (let i = 1; i <= 4; i++) {
                let nx = x + dx * i, ny = y + dy * i;
                if (nx < 0 || nx >= size || ny < 0 || ny >= size) break;
                if (board[nx][ny] === player) count++;
                else if (board[nx][ny] === 0) { openEnds++; break; }
                else break;
            }
            // 반대쪽
            for (let i = 1; i <= 4; i++) {
                let nx = x - dx * i, ny = y - dy * i;
                if (nx < 0 || nx >= size || ny < 0 || ny >= size) break;
                if (board[nx][ny] === player) count++;
                else if (board[nx][ny] === 0) { openEnds++; break; }
                else break;
            }

            // 점수 부여 (연속된 돌의 수와 열린 공간에 따라)
            if (count >= 5) totalScore += 100000;
            else if (count === 4 && openEnds === 2) totalScore += 10000;
            else if (count === 4 && openEnds === 1) totalScore += 1000;
            else if (count === 3 && openEnds === 2) totalScore += 500;
            else if (count === 3 && openEnds === 1) totalScore += 100;
            else if (count === 2 && openEnds === 2) totalScore += 50;
        }
        return totalScore;
    }

    // --- 파티클 시스템 (불꽃놀이) ---
    let particles = [];
    let animationId;
    function startFireworks() {
        for (let i = 0; i < 150; i++) {
            particles.push({
                x: canvas.width / 2,
                y: canvas.height / 2,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10,
                life: 1,
                color: `hsl(${Math.random() * 360}, 100%, 50%)`
            });
        }
        animateFireworks();
    }

    function animateFireworks() {
        if (gameState !== 'VICTORY') return;
        ctx.fillStyle = 'rgba(44, 62, 80, 0.2)'; // 잔상 효과
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < particles.length; i++) {
            let p = particles[i];
            ctx.beginPath();
            ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();

            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.05; // 중력
            p.life -= 0.01;

            if (p.life <= 0) {
                particles.splice(i, 1);
                i--;
            }
        }
        
        // 계속 새로운 불꽃 추가
        if(Math.random() < 0.1) {
            let basex = Math.random() * canvas.width;
            let basey = Math.random() * canvas.height * 0.5;
            for(let i=0; i<30; i++) {
                 particles.push({
                    x: basex, y: basey,
                    vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.5) * 5,
                    life: 1, color: `hsl(${Math.random() * 360}, 100%, 50%)`
                });
            }
            playSound('stone'); // 불꽃놀이 팝 소리 대용
        }

        animationId = requestAnimationFrame(animateFireworks);
    }

    // --- UI 이벤트 리스너 ---
    document.getElementById('startScreen').addEventListener('click', function(e) {
        initAudio();
        this.classList.add('hidden');
        gameState = 'PLAYING';
        resize();
        initBoard();
    });

    document.getElementById('gameOverScreen').addEventListener('click', function() {
        this.classList.add('hidden');
        gameState = 'PLAYING';
        initBoard();
    });

    document.getElementById('victoryScreen').addEventListener('click', function() {
        cancelAnimationFrame(animationId);
        particles = [];
        this.classList.add('hidden');
        currentRound = 1;
        gameState = 'PLAYING';
        initBoard();
    });

    // 초기 실행
    resize();
</script>

</body>
</html>
